# .github/workflows/container-build.yml
#
# Builds TVHeadend from source for:
#   linux/amd64   — ubuntu-latest (native)
#   linux/arm64   — ubuntu-24.04-arm (native, free GitHub-hosted)
#   linux/riscv64 — ubuntu-24.04-riscv (RISE RISC-V Runners, native)
#
# Rules:
#  - NEVER use QEMU for arm64 or riscv64
#  - Builds from OUR upstream branch and OUR streamlink-drm branch
#  - built-tags.txt ledger prevents duplicate builds
#  - Image names lowercase (GHCR requirement)
#  - Node24-compatible action versions (Node20 forced off 2026-06-16)

name: Build & Push Multi-Arch Image

permissions:
  contents: write
  packages: write

concurrency:
  group: container-build-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "support/**"
      - ".github/workflows/container-build.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "support/**"
      - ".github/workflows/container-build.yml"
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-release]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Pre-flight: resolve branch HEADs and check the build ledger
  # ─────────────────────────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build:    ${{ steps.ledger.outputs.should_build }}
      image_name:      ${{ steps.image.outputs.name }}
      short_sha:       ${{ steps.sha.outputs.short }}
      tvh_ref:         ${{ steps.refs.outputs.tvh_ref }}
      dashdrm_ref:     ${{ steps.refs.outputs.dashdrm_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive image name (lowercase)
        id: image
        run: |
          NAME=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Resolve branch refs to build from
        id: refs
        run: |
          # TVHeadend: build from our upstream branch if it exists, else master
          if git ls-remote --exit-code origin refs/heads/upstream; then
            TVH_REF=$(git rev-parse origin/upstream)
            echo "Building TVHeadend from our upstream branch (${TVH_REF::8})"
          else
            TVH_REF="master"
            echo "upstream branch not yet created — building from tvheadend/tvheadend:master"
          fi
          echo "tvh_ref=${TVH_REF}" >> "$GITHUB_OUTPUT"

          # streamlink-drm plugin: build from our mirror branch if it exists
          if git ls-remote --exit-code origin refs/heads/streamlink-drm; then
            DASHDRM_REF=$(git rev-parse origin/streamlink-drm)
            DASHDRM_REPO="https://github.com/$GITHUB_REPOSITORY"
            echo "Building dashdrm from our streamlink-drm branch (${DASHDRM_REF::8})"
          else
            DASHDRM_REF="main"
            DASHDRM_REPO="https://github.com/titus-au/streamlink-plugin-dashdrm"
            echo "streamlink-drm branch not yet created — building from upstream titus-au"
          fi
          echo "dashdrm_ref=${DASHDRM_REF}" >> "$GITHUB_OUTPUT"
          echo "dashdrm_repo=${DASHDRM_REPO}" >> "$GITHUB_OUTPUT"

      - name: Check built-tags ledger
        id: ledger
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f built-tags.txt ] && grep -qx "$GITHUB_SHA" built-tags.txt; then
            echo "SHA $GITHUB_SHA already built — skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Build each arch on its native runner
  # ─────────────────────────────────────────────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:     amd64
            runner:   ubuntu-latest
            platform: linux/amd64

          - arch:     arm64
            runner:   ubuntu-24.04-arm
            platform: linux/arm64

          - arch:     riscv64
            runner:   ubuntu-24.04-riscv
            platform: linux/riscv64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OCI metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ needs.check.outputs.image_name }}

      - name: Build & push (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ needs.check.outputs.image_name }}:latest-${{ matrix.arch }}
            ghcr.io/${{ needs.check.outputs.image_name }}:${{ needs.check.outputs.short_sha }}-${{ matrix.arch }}
          build-args: |
            ALPINE_VERSION=edge
            TVH_REPO=https://github.com/${{ github.repository }}
            TVH_REF=${{ needs.check.outputs.tvh_ref }}
            DASHDRM_REPO=https://github.com/${{ github.repository }}
            DASHDRM_REF=${{ needs.check.outputs.dashdrm_ref }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.arch }}

  # ─────────────────────────────────────────────────────────────────────────
  # Combine per-arch images into a single multi-arch manifest
  # ─────────────────────────────────────────────────────────────────────────
  manifest:
    needs: [check, build]
    if: |
      needs.check.outputs.should_build == 'true' &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          IMAGE:     ghcr.io/${{ needs.check.outputs.image_name }}
          SHORT_SHA: ${{ needs.check.outputs.short_sha }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${SHORT_SHA}" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64" \
            "${IMAGE}:latest-riscv64"
          docker buildx imagetools inspect "${IMAGE}:latest"

      - name: Update built-tags ledger
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$GITHUB_SHA" >> built-tags.txt
          tail -100 built-tags.txt > built-tags.tmp && mv built-tags.tmp built-tags.txt
          git add built-tags.txt
          git commit -m "chore: mark ${GITHUB_SHA::8} as built [bot]"
          git push origin main
