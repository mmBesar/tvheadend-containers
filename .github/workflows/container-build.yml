# .github/workflows/container-build.yml
#
# Builds TVHeadend from source for:
#   linux/amd64   — ubuntu-latest (native)
#   linux/arm64   — ubuntu-24.04-arm (native, free GitHub-hosted)
#   linux/riscv64 — ubuntu-24.04-riscv (RISE RISC-V Runners, native)
#
# Triggered by: push to main when versions.lock changes (auto), or
#               workflow_dispatch (manual — increments build counter).
#
# Image tags use the version string from versions.lock:
#   ghcr.io/mmbesar/tvheadend-containers:4.3-2660~gb162cce27-mmb3
#   ghcr.io/mmbesar/tvheadend-containers:latest
#
# Rules:
#  - NEVER use QEMU for arm64 or riscv64
#  - Image names lowercase (GHCR requirement)
#  - Node24-compatible action versions (Node20 forced off 2026-06-16)

name: Build & Push Multi-Arch Image

permissions:
  contents: write
  packages: write

concurrency:
  group: container-build
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "versions.lock"
      - "Dockerfile"
      - "support/**"
      - ".github/workflows/container-build.yml"
  pull_request:
    paths:
      - "versions.lock"
      - "Dockerfile"
      - "support/**"
      - ".github/workflows/container-build.yml"
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Pre-flight: read versions.lock, resolve refs, handle manual dispatch
  # ───────────────────────────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build:  ${{ steps.lockfile.outputs.should_build }}
      image_name:    ${{ steps.image.outputs.name }}
      tvh_version:   ${{ steps.lockfile.outputs.tvh_version }}
      build_num:     ${{ steps.lockfile.outputs.build_num }}
      image_version: ${{ steps.lockfile.outputs.image_version }}
      tvh_ref:       ${{ steps.refs.outputs.tvh_ref }}
      dashdrm_ref:   ${{ steps.refs.outputs.dashdrm_ref }}
      hlsdrm_ref:    ${{ steps.refs.outputs.hlsdrm_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Derive image name (lowercase)
        id: image
        run: |
          NAME=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Read versions.lock and determine build number
        id: lockfile
        run: |
          TVH_VERSION=$(grep '^tvh_version=' versions.lock | cut -d= -f2)
          BUILD=$(grep '^build=' versions.lock | cut -d= -f2)

          # On manual dispatch: increment counter and update the lockfile
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD=$(( BUILD + 1 ))
            # Update lockfile with new build number
            TVH_SHA=$(grep '^tvh_sha=' versions.lock | cut -d= -f2)
            SL_DASHDRM=$(grep '^sl_dashdrm_sha=' versions.lock | cut -d= -f2)
            SL_HLSDRM=$(grep '^sl_hlsdrm_sha=' versions.lock | cut -d= -f2)
            {
              echo '# versions.lock — managed by GitHub Actions, do not edit manually.'
              echo '# Tracks the exact state of each input branch that was last built.'
              echo '# A rebuild is triggered only when one of these values changes.'
              echo '# To force a manual rebuild: run container-build workflow_dispatch.'
              echo '#'
              echo '# tvh_version: upstream version string from git describe (used for image tags)'
              echo '# build:       incrementing counter, resets to 1 on new tvh_version'
              echo ''
              echo "tvh_sha=${TVH_SHA}"
              echo "sl_dashdrm_sha=${SL_DASHDRM}"
              echo "sl_hlsdrm_sha=${SL_HLSDRM}"
              echo "tvh_version=${TVH_VERSION}"
              echo "build=${BUILD}"
            } > versions.lock
            git add versions.lock
            git commit -m "chore: manual rebuild, build ${BUILD} [bot]"
            git push origin main
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

          # Image version tag: e.g. 4.3-2660.gb162cce27-mmb3
          # Note: ~ is replaced with . because Docker tags cannot contain ~
          IMAGE_VERSION="$(echo "${TVH_VERSION}" | tr '~' '.')-mmb${BUILD}"
          echo "tvh_version=${TVH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_num=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "image_version=${IMAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Image version: ${IMAGE_VERSION}"

      - name: Resolve branch refs to build from
        id: refs
        run: |
          # TVHeadend: our tvheadend branch
          if git ls-remote --exit-code origin refs/heads/tvheadend; then
            TVH_REF="tvheadend"
          else
            TVH_REF="master"
            echo "WARNING: tvheadend branch not found, falling back to upstream master"
          fi
          echo "tvh_ref=${TVH_REF}" >> "$GITHUB_OUTPUT"

          # dashdrm plugin
          if git ls-remote --exit-code origin refs/heads/sl-dashdrm; then
            DASHDRM_REF="sl-dashdrm"
          else
            DASHDRM_REF="main"
            echo "WARNING: sl-dashdrm branch not found, falling back to upstream"
          fi
          echo "dashdrm_ref=${DASHDRM_REF}" >> "$GITHUB_OUTPUT"

          # hlsdrm plugin
          if git ls-remote --exit-code origin refs/heads/sl-hlsdrm; then
            HLSDRM_REF="sl-hlsdrm"
          else
            HLSDRM_REF="main"
            echo "WARNING: sl-hlsdrm branch not found, falling back to upstream"
          fi
          echo "hlsdrm_ref=${HLSDRM_REF}" >> "$GITHUB_OUTPUT"

  # ───────────────────────────────────────────────────────────────────────────
  # Build each arch on its native runner
  # ───────────────────────────────────────────────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:     amd64
            runner:   ubuntu-latest
            platform: linux/amd64

          - arch:     arm64
            runner:   ubuntu-24.04-arm
            platform: linux/arm64

          - arch:     riscv64
            runner:   ubuntu-24.04-riscv
            platform: linux/riscv64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OCI metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ needs.check.outputs.image_name }}

      - name: Build & push (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ needs.check.outputs.image_name }}:latest-${{ matrix.arch }}
            ghcr.io/${{ needs.check.outputs.image_name }}:${{ needs.check.outputs.image_version }}-${{ matrix.arch }}
          build-args: |
            ALPINE_VERSION=edge
            TVH_REPO=https://github.com/${{ github.repository }}
            TVH_REF=${{ needs.check.outputs.tvh_ref }}
            TVH_VERSION=${{ needs.check.outputs.tvh_version }}
            DASHDRM_REPO=https://github.com/${{ github.repository }}
            DASHDRM_REF=${{ needs.check.outputs.dashdrm_ref }}
            HLSDRM_REPO=https://github.com/${{ github.repository }}
            HLSDRM_REF=${{ needs.check.outputs.hlsdrm_ref }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.arch }}

  # ───────────────────────────────────────────────────────────────────────────
  # Combine per-arch images into a single multi-arch manifest
  # ───────────────────────────────────────────────────────────────────────────
  manifest:
    needs: [check, build]
    if: |
      needs.check.outputs.should_build == 'true' &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          IMAGE:         ghcr.io/${{ needs.check.outputs.image_name }}
          IMAGE_VERSION: ${{ needs.check.outputs.image_version }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${IMAGE_VERSION}" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64" \
            "${IMAGE}:latest-riscv64"
          docker buildx imagetools inspect "${IMAGE}:latest"
          echo "Published: ${IMAGE}:${IMAGE_VERSION}"
