# .github/workflows/container-build.yml
#
# Builds TVHeadend from source for:
#   linux/amd64   — ubuntu-latest (native)
#   linux/arm64   — arm64 GitHub-hosted runner (native, FREE — no QEMU)
#   linux/riscv64 — RISE RISC-V runner (native, no QEMU)
#
# Rules:
#  - NEVER use QEMU for arm64 or riscv64
#  - built-tags.txt ledger prevents duplicate image builds
#  - Image names are lowercase (GHCR requirement)
#  - Tags point to OUR repo HEAD, not upstream commits
#  - Node24-compatible action versions (Node20 forced off 2026-06-16)

name: Build & Push Multi-Arch Image

permissions:
  contents: write   # to update built-tags.txt
  packages: write   # to push to GHCR

concurrency:
  group: container-build-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "support/**"
      - ".github/workflows/container-build.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "support/**"
      - ".github/workflows/container-build.yml"
  workflow_dispatch:
  repository_dispatch:
    types: [upstream-release]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Decide whether we actually need to build (skip if this SHA is already done)
  # ───────────────────────────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.ledger.outputs.should_build }}
      image_name:   ${{ steps.image.outputs.name }}
      short_sha:    ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Derive image name (lowercase)
        id: image
        run: |
          NAME=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Short SHA
        id: sha
        run: |
          echo "short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Check built-tags ledger
        id: ledger
        run: |
          # On PRs we always build (no push)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f built-tags.txt ] && grep -qx "$GITHUB_SHA" built-tags.txt; then
            echo "SHA $GITHUB_SHA already built — skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # Build each arch on its native runner
  # ───────────────────────────────────────────────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:    amd64
            runner:  ubuntu-latest        # native x86_64
            platform: linux/amd64

          - arch:    arm64
            runner:  ubuntu-24.04-arm     # native arm64, free GitHub-hosted
            platform: linux/arm64

          - arch:    riscv64
            runner:  ubuntu-24.04-riscv   # RISE RISC-V runner (risev-runners.org)
            platform: linux/riscv64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OCI metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ needs.check.outputs.image_name }}
          tags: |
            type=raw,value=latest-${{ matrix.arch }}
            type=sha,prefix=${{ matrix.arch }}-,format=short

      - name: Build & push (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ needs.check.outputs.image_name }}:latest-${{ matrix.arch }}
            ghcr.io/${{ needs.check.outputs.image_name }}:${{ needs.check.outputs.short_sha }}-${{ matrix.arch }}
          build-args: |
            ALPINE_VERSION=edge
            TVH_REPO=https://github.com/tvheadend/tvheadend
            TVH_REF=master
          labels: ${{ steps.meta.outputs.labels }}
          # Per-arch GHA cache scoped to this arch to avoid cross-contamination
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.arch }}

  # ───────────────────────────────────────────────────────────────────────────
  # Combine per-arch images into a single multi-arch manifest
  # ───────────────────────────────────────────────────────────────────────────
  manifest:
    needs: [check, build]
    if: |
      needs.check.outputs.should_build == 'true' &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need write access to update built-tags.txt
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          IMAGE: ghcr.io/${{ needs.check.outputs.image_name }}
          SHORT_SHA: ${{ needs.check.outputs.short_sha }}
        run: |
          # :latest  — points to all three arches
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${SHORT_SHA}" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64" \
            "${IMAGE}:latest-riscv64"

          echo "Manifest created:"
          docker buildx imagetools inspect "${IMAGE}:latest"

      - name: Update built-tags ledger
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Append this SHA so we never build it again
          echo "$GITHUB_SHA" >> built-tags.txt

          # Keep the ledger tidy — last 100 entries only
          tail -100 built-tags.txt > built-tags.tmp \
            && mv built-tags.tmp built-tags.txt

          git add built-tags.txt
          git commit -m "chore: mark ${GITHUB_SHA::8} as built [bot]"
          git push origin main
