# .github/workflows/streamlink-drm-sync.yml
#
# Mirrors ImAleeexx/streamlink-drm → our `streamlink-drm` branch.
# The Dockerfile builds from this branch, not the original repo,
# so we are never at risk if the original is deleted or goes private.

name: Sync — streamlink-drm Mirror

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-sync-streamlink-drm
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.compare.outputs.updated }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream streamlink-drm
        id: fetch
        run: |
          git remote add sldrm https://github.com/titus-au/streamlink-plugin-dashdrm.git || true
          git fetch sldrm main --no-tags
          SHA=$(git rev-parse sldrm/main)
          echo "upstream_sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Compare with our streamlink-drm branch
        id: compare
        run: |
          if git ls-remote --exit-code origin refs/heads/streamlink-drm; then
            git fetch origin streamlink-drm
            OUR=$(git rev-parse origin/streamlink-drm)
            if [ "$OUR" = "${{ steps.fetch.outputs.upstream_sha }}" ]; then
              echo "No changes in streamlink-drm upstream."
              echo "updated=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Update streamlink-drm branch
        if: steps.compare.outputs.updated == 'true'
        run: |
          git checkout -B streamlink-drm sldrm/main
          # Strip any .github/ from upstream to keep our workflows clean
          if [ -d .github ]; then
            git rm -rf .github/ --quiet
            git commit -m "chore: strip upstream .github/ [bot]"
          fi
          git push origin streamlink-drm --force-with-lease
          echo "streamlink-drm branch updated to ${{ steps.fetch.outputs.upstream_sha }}"

  trigger-build:
    needs: sync
    if: needs.sync.outputs.updated == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch container-build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              event_type: 'upstream-release',
              client_payload: { source: 'streamlink-drm' }
            });
