# .github/workflows/sync-sl-dashdrm.yml
#
# Mirrors titus-au/streamlink-plugin-dashdrm:main → our `sl-dashdrm` branch.
# On new commits: updates versions.lock on main, which triggers the build.

name: Sync — sl-dashdrm

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-sl-dashdrm
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream sl-dashdrm
        id: fetch
        run: |
          git remote add sldrm https://github.com/titus-au/streamlink-plugin-dashdrm.git || true
          git fetch sldrm main --no-tags
          SHA=$(git rev-parse sldrm/main)
          echo "upstream_sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Check if sl-dashdrm branch needs update
        id: compare
        run: |
          if git ls-remote --exit-code origin refs/heads/sl-dashdrm; then
            git fetch origin sl-dashdrm
            OUR=$(git rev-parse origin/sl-dashdrm)
            if [ "$OUR" = "${{ steps.fetch.outputs.upstream_sha }}" ]; then
              echo "No changes in sl-dashdrm upstream."
              echo "updated=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Update sl-dashdrm branch
        if: steps.compare.outputs.updated == 'true'
        run: |
          git checkout -B sl-dashdrm sldrm/main
          if [ -d .github ]; then
            git rm -rf .github/ --quiet
            git commit -m "chore: strip upstream .github/ [bot]"
          fi
          git push origin sl-dashdrm --force-with-lease

      - name: Update versions.lock on main
        if: steps.compare.outputs.updated == 'true'
        run: |
          git checkout main

          # Read current values — preserve tvheadend fields unchanged
          TVH_SHA=$(grep '^tvh_sha=' versions.lock | cut -d= -f2)
          SL_HLSDRM=$(grep '^sl_hlsdrm_sha=' versions.lock | cut -d= -f2)
          TVH_VERSION=$(grep '^tvh_version=' versions.lock | cut -d= -f2)
          BUILD=$(grep '^build=' versions.lock | cut -d= -f2)
          BUILD=$(( BUILD + 1 ))

          cat > versions.lock << LOCKEOF
# versions.lock — managed by GitHub Actions, do not edit manually.
# Tracks the exact state of each input branch that was last built.
# A rebuild is triggered only when one of these values changes.
# To force a manual rebuild: run container-build workflow_dispatch.
#
# tvh_version: upstream version string from git describe (used for image tags)
# build:       incrementing counter, resets to 1 on new tvh_version

tvh_sha=${TVH_SHA}
sl_dashdrm_sha=${{ steps.fetch.outputs.upstream_sha }}
sl_hlsdrm_sha=${SL_HLSDRM}
tvh_version=${TVH_VERSION}
build=${BUILD}
LOCKEOF

          git add versions.lock
          git commit -m "chore: sl-dashdrm updated, build ${BUILD} [bot]"
          git push origin main
