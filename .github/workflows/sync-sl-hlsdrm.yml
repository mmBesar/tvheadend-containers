# .github/workflows/sync-sl-hlsdrm.yml
#
# Mirrors titus-au/streamlink-plugin-hlsdrm:main → our `sl-hlsdrm` branch.
# On new commits: updates versions.lock on main, which triggers the build.

name: Sync — sl-hlsdrm

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-sl-hlsdrm
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream sl-hlsdrm
        id: fetch
        run: |
          git remote add hlsdrm https://github.com/titus-au/streamlink-plugin-hlsdrm.git || true
          git fetch hlsdrm main --no-tags
          SHA=$(git rev-parse hlsdrm/main)
          echo "upstream_sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Check if sl-hlsdrm branch needs update
        id: compare
        run: |
          if git ls-remote --exit-code origin refs/heads/sl-hlsdrm; then
            git fetch origin sl-hlsdrm
            OUR=$(git rev-parse origin/sl-hlsdrm)
            if [ "$OUR" = "${{ steps.fetch.outputs.upstream_sha }}" ]; then
              echo "No changes in sl-hlsdrm upstream."
              echo "updated=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Update sl-hlsdrm branch
        if: steps.compare.outputs.updated == 'true'
        run: |
          git checkout -B sl-hlsdrm hlsdrm/main
          if [ -d .github ]; then
            git rm -rf .github/ --quiet
            git commit -m "chore: strip upstream .github/ [bot]"
          fi
          git push origin sl-hlsdrm --force-with-lease

      - name: Update versions.lock on main
        if: steps.compare.outputs.updated == 'true'
        run: |
          git checkout main

          # Read current values — preserve all other fields unchanged
          TVH_SHA=$(grep '^tvh_sha=' versions.lock | cut -d= -f2)
          SL_DASHDRM=$(grep '^sl_dashdrm_sha=' versions.lock | cut -d= -f2)
          TVH_VERSION=$(grep '^tvh_version=' versions.lock | cut -d= -f2)
          BUILD=$(grep '^build=' versions.lock | cut -d= -f2)
          BUILD=$(( BUILD + 1 ))

          UPSTREAM_SHA="${{ steps.fetch.outputs.upstream_sha }}"
          {
            echo '# versions.lock — managed by GitHub Actions, do not edit manually.'
            echo '# Tracks the exact state of each input branch that was last built.'
            echo '# A rebuild is triggered only when one of these values changes.'
            echo '# To force a manual rebuild: run container-build workflow_dispatch.'
            echo '#'
            echo '# tvh_version: upstream version string from git describe (used for image tags)'
            echo '# build:       incrementing counter, resets to 1 on new tvh_version'
            echo ''
            echo "tvh_sha=${TVH_SHA}"
            echo "sl_dashdrm_sha=${SL_DASHDRM}"
            echo "sl_hlsdrm_sha=${UPSTREAM_SHA}"
            echo "tvh_version=${TVH_VERSION}"
            echo "build=${BUILD}"
          } > versions.lock

          git add versions.lock
          git commit -m "chore: sl-hlsdrm updated, build ${BUILD} [bot]"
          git push origin main
