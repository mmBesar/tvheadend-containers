# .github/workflows/sync-sl-hlsdrm.yml
#
# Mirrors titus-au/streamlink-plugin-hlsdrm:main → our `sl-hlsdrm` branch.
# Protects us from upstream deletion and triggers a rebuild on updates.

name: Sync — sl-hlsdrm

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-sl-hlsdrm
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.compare.outputs.updated }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream hlsdrm
        id: fetch
        run: |
          git remote add hlsdrm https://github.com/titus-au/streamlink-plugin-hlsdrm.git || true
          git fetch hlsdrm main --no-tags
          SHA=$(git rev-parse hlsdrm/main)
          echo "upstream_sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Compare with our sl-hlsdrm branch
        id: compare
        run: |
          if git ls-remote --exit-code origin refs/heads/sl-hlsdrm; then
            git fetch origin sl-hlsdrm
            OUR=$(git rev-parse origin/sl-hlsdrm)
            if [ "$OUR" = "${{ steps.fetch.outputs.upstream_sha }}" ]; then
              echo "No changes in hlsdrm upstream."
              echo "updated=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Update sl-hlsdrm branch
        if: steps.compare.outputs.updated == 'true'
        run: |
          git checkout -B sl-hlsdrm hlsdrm/main
          if [ -d .github ]; then
            git rm -rf .github/ --quiet
            git commit -m "chore: strip upstream .github/ [bot]"
          fi
          git push origin sl-hlsdrm --force-with-lease
          echo "sl-hlsdrm updated to ${{ steps.fetch.outputs.upstream_sha }}"

  trigger-build:
    needs: sync
    if: needs.sync.outputs.updated == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch container-build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              event_type: 'upstream-release',
              client_payload: { source: 'sl-hlsdrm' }
            });
