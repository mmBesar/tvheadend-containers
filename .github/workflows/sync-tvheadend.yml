# .github/workflows/upstream-sync.yml
#
# Syncs tvheadend/tvheadend:master → our `upstream` branch.
# Dispatches a build event when new commits are detected.

name: Sync — TVHeadend

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-tvheadend
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.compare.outputs.updated }}
      upstream_sha: ${{ steps.fetch.outputs.upstream_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        id: fetch
        run: |
          git remote add upstream https://github.com/tvheadend/tvheadend.git || true
          git fetch upstream master --no-tags
          SHA=$(git rev-parse upstream/master)
          echo "upstream_sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Compare with our upstream branch
        id: compare
        run: |
          if git ls-remote --exit-code origin refs/heads/tvheadend; then
            git fetch origin upstream
            OUR=$(git rev-parse origin/tvheadend)
            if [ "$OUR" = "${{ steps.fetch.outputs.upstream_sha }}" ]; then
              echo "updated=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Update upstream branch
        if: steps.compare.outputs.updated == 'true'
        run: |
          git checkout -B tvheadend upstream/master
          # Strip upstream's .github/ — must never interfere with our workflows
          if [ -d .github ]; then
            git rm -rf .github/ --quiet
            git commit -m "chore: strip upstream .github/ [bot]"
          fi
          git push origin tvheadend --force-with-lease

  trigger-build:
    needs: sync
    if: needs.sync.outputs.updated == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch container-build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              event_type: 'upstream-release',
              client_payload: { source: 'tvheadend', sha: '${{ needs.sync.outputs.upstream_sha }}' }
            });
